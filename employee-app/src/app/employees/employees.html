<div class="container mt-5">
  <h2 class="text-center mb-4">Gestión de Empleados</h2>

  <!-- FORMULARIO -->
  <div class="card p-4 shadow mb-4">
    <div class="row g-2">
      <div class="col-md-5">
        <input [(ngModel)]="newEmployee.name" class="form-control" placeholder="Nombre">
      </div>
      <div class="col-md-5">
        <input [(ngModel)]="newEmployee.email" class="form-control" placeholder="Email">
      </div>
      <div class="col-md-2">
        <button (click)="addEmployee()" class="btn btn-primary w-100">
          Agregar
        </button>
      </div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="card shadow p-3">
    <table class="table table-striped table-hover text-center">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let emp of employees">
          <td>{{ emp.id }}</td>
          <td>{{ emp.name }}</td>
          <td>{{ emp.email }}</td>
          <td>
            <button class="btn btn-danger btn-sm"
                    (click)="deleteEmployee(emp.id)">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
