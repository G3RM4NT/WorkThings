<div style="max-width: 500px; margin: auto; font-family: Arial;">
  <h2>CRUD Empleados</h2>

  <div style="margin-bottom: 20px;">
    <input [(ngModel)]="newEmployee.name" placeholder="Nombre" />
    <input [(ngModel)]="newEmployee.email" placeholder="Email" />
    <button (click)="addEmployee()">Agregar empleado</button>
  </div>

  <ul>
    <li *ngFor="let emp of employees">
      {{ emp.name }} - {{ emp.email }}
      <button (click)="deleteEmployee(emp.id)">Eliminar</button>
    </li>
  </ul>
</div>
