<div class="container mt-5">
  <h2 class="text-center mb-4">Gestión de Clientes</h2>

  <!-- FORMULARIO -->
  <div class="card p-4 shadow mb-4">
    <div class="row g-2">
      <div class="col-md-3">
        <input [(ngModel)]="newclients.name" class="form-control" placeholder="Nombre">
      </div>
      <div class="col-md-3">
        <input [(ngModel)]="newclients.apellido" class="form-control" placeholder="Apellido">
      </div>
      <div class="col-md-2">
        <input [(ngModel)]="newclients.edad" class="form-control" placeholder="Edad">
      </div>
      <div class="col-md-2">
        <input [(ngModel)]="newclients.email" class="form-control" placeholder="Email">
      </div>
      <div class="col-md-1">
        <button (click)="addclients()" class="btn btn-primary w-100">
          Agregar
        </button>
      </div>
      <div class="col-md-1">
        <button (click)="guardarUpdate()" class="btn btn-success w-100">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="card shadow p-3">
    <table class="table table-striped table-hover text-center">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Edad</th>
          <th>Email</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let cli of clients">
          <td>{{ cli.id }}</td>
          <td>{{ cli.name }}</td>
          <td>{{ cli.apellido }}</td>
          <td>{{ cli.edad }}</td>
          <td>{{ cli.email }}</td>
          <td>
            <button class="btn btn-danger btn-sm me-1"
                    (click)="deleteclients(cli.id)">
              Eliminar
            </button>
            <button class="btn btn-warning btn-sm"
                    (click)="updateclients(cli)">
              Editar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
